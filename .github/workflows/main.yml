name: Build NekoX APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Base64 to Keystore File
      env:
        KEYSTORE_BASE64: ${{ secrets.KEY_STORE }}
      run: |
        echo "$KEYSTORE_BASE64" | base64 --decode > release.keystore

    - name: Build with Gradle
      env:
        KEYSTORE_PASSWORD: ${{ secrets.KEY_PASS }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      run: |
        ./gradlew assemblePlayRelease \
          -Pandroid.injected.signing.store.file=../release.keystore \
          -Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD \
          -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
          -Pandroid.injected.signing.key.password=$KEYSTORE_PASSWORD

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: NekoX-Play-Release
        path: TMessagesProj/build/outputs/apk/play/release/*.apk
