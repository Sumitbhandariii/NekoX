name: Build NekoX APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Create Keystore Directory and Decode
      env:
        KEYSTORE_BASE64: ${{ secrets.KEY_STORE }}
      run: |
        mkdir -p TMessagesProj/config
        echo "$KEYSTORE_BASE64" | base64 --decode > TMessagesProj/config/release.keystore

    - name: Build with Gradle
      env:
        KEYSTORE_PASSWORD: ${{ secrets.KEY_PASS }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      run: |
        ./gradlew assembleAfatRelease \
          -PRELEASE_STORE_PASSWORD=$KEYSTORE_PASSWORD \
          -PRELEASE_KEY_ALIAS=$KEY_ALIAS \
          -PRELEASE_KEY_PASSWORD=$KEYSTORE_PASSWORD \
          -Pandroid.injected.signing.store.file=../TMessagesProj/config/release.keystore \
          -Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD \
          -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
          -Pandroid.injected.signing.key.password=$KEYSTORE_PASSWORD \
          -x :TMessagesProj_App:validateSigningAfatRelease

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: NekoX-Official-Release
        path: "**/build/outputs/apk/**/*.apk"
